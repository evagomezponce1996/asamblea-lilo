<meta name="description" content="“La asamblea de Lilo” es un proyecto dirigido al alumnado de Educación Infantil de 4 años. Su finalidad es trabajar las rutinas diarias de la asamblea mediante un Genially interactivo protagonizado por Lilo, el mono mascota de la clase.

El recurso integra el uso de la PDI, Genially, canciones, pictogramas, fotografías, audios y materiales manipulativos para favorecer la participación, la autonomía, la comunicación oral, la competencia digital y el uso seguro de la tecnología.">
